<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Angela Guilherme- Web Developer Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* =========================
   CINEMATIC BASE
========================= */
:root{
  --bg1:#050814;
  --bg2:#0b1026;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --accent1:#6366f1;
  --accent2:#ec4899;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,sans-serif;
  color:var(--text);
  background: radial-gradient(circle at 20% 20%, #1b2a6b33, transparent 40%),
              radial-gradient(circle at 80% 70%, #ec489933, transparent 40%),
              linear-gradient(180deg,var(--bg1),var(--bg2));
  overflow-x:hidden;
}

/* =========================
   CINEMATIC LIGHT BEAM CURSOR
========================= */
.cursor{
  position:fixed;
  width:400px;
  height:400px;
  background:radial-gradient(circle,rgba(99,102,241,0.18),transparent 70%);
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:1;
  transition:transform 0.08s linear;
}

/* =========================
   PARALLAX LAYERS
========================= */
.layer{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

.blob{
  position:absolute;
  width:500px;
  height:500px;
  filter:blur(140px);
  opacity:.25;
  animation:float 14s ease-in-out infinite;
}

.blob.one{background:#6366f1;top:-120px;left:-120px}
.blob.two{background:#ec4899;bottom:-150px;right:-120px}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(60px)}
}

/* =========================
   HERO (CINEMATIC OPENING SHOT)
========================= */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  z-index:2;
}

.hero h1{
  font-size:4rem;
  margin:0;
  background:linear-gradient(90deg,var(--accent1),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  letter-spacing:-1px;
}

.hero p{
  color:var(--muted);
  font-size:1.2rem;
  max-width:600px;
}

/* cinematic fade hint */
.scroll-hint{
  position:absolute;
  bottom:40px;
  color:var(--muted);
  font-size:.9rem;
  animation:fade 2s infinite;
}

@keyframes fade{
  0%,100%{opacity:.3}
  50%{opacity:1}
}

/* =========================
   FEATURED PROJECT (TRAILER STYLE)
========================= */
.featured{
  min-height:80vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:80px 20px;
  position:relative;
  z-index:2;
}

.featured-card{
  width:min(1000px,90%);
  border-radius:20px;
  overflow:hidden;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(18px);
  display:grid;
  grid-template-columns:1.2fr 1fr;
  border:1px solid rgba(255,255,255,0.08);
  transform:translateY(40px);
  opacity:0;
  transition:1s ease;
}

.featured-card.show{
  transform:translateY(0);
  opacity:1;
}

.featured img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.featured-content{
  padding:30px;
}

.featured h2{
  margin:0;
  font-size:2rem;
}

.featured p{
  color:var(--muted);
}

/* =========================
   PROJECT CINEMA GRID
========================= */
.section{
  padding:80px 20px;
  position:relative;
  z-index:2;
}

.grid{
  max-width:1200px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:24px;
}

/* cinematic cards */
.card{
  border-radius:16px;
  overflow:hidden;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.08);
  transform:translateY(40px) scale(.98);
  opacity:0;
  transition:0.8s ease;
}

.card.show{
  transform:translateY(0) scale(1);
  opacity:1;
}

.card:hover{
  transform:translateY(-10px) scale(1.02);
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
  transition:0.6s;
}

.card:hover img{
  transform:scale(1.08);
}

.card-content{
  padding:16px;
}

.card h3{
  margin:0;
}

.card p{
  color:var(--muted);
  font-size:.9rem;
}

a{
  text-decoration:none;
}

/* buttons */
.btns{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.btn{
  padding:8px 12px;
  border-radius:10px;
  font-size:.8rem;
  transition:.3s;
}

.primary{
  background:linear-gradient(135deg,var(--accent1),var(--accent2));
  color:white;
}

.secondary{
  background:rgba(255,255,255,0.08);
  color:var(--text);
}

.btn:hover{
  transform:translateY(-2px);
}

/* =========================
   SCENE FADE TRANSITIONS
========================= */
.section{
  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}

.section.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div class="cursor"></div>

<div class="layer">
  <div class="blob one"></div>
  <div class="blob two"></div>
</div>

<!-- HERO SCENE -->
<div class="hero">
  <h1>Angela Guilherme</h1>
  <p>A cinematic developer portfolio experience — where code meets storytelling</p>
  <div class="scroll-hint">Scroll to begin ↓</div>
</div>

<!-- FEATURED SCENE -->
<div class="featured">
  <div class="featured-card" id="featured">
    <img src="https://opengraph.githubassets.com/1/octocat/Hello-World">
    <div class="featured-content">
      <h2>Featured Project</h2>
      <p>This is your main cinematic highlight project. It behaves like a trailer card — slow reveal, emotional focus, premium spacing.</p>
    </div>
  </div>
</div>

<!-- PROJECT GRID SCENE -->
<div class="section">
  <div class="grid" id="repos"></div>
</div>

<script>
const username="angelaguilherme-Lo";

/* CURSOR LIGHT */
document.addEventListener("mousemove",e=>{
  const c=document.querySelector(".cursor");
  c.style.left=e.clientX+"px";
  c.style.top=e.clientY+"px";
});

/* FETCH */
fetch(`https://api.github.com/users/${username}/repos`)
.then(r=>r.json())
.then(data=>{
  const container=document.getElementById("repos");

  data.filter(r=>!r.fork).forEach((repo,i)=>{
    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="https://opengraph.githubassets.com/1/${username}/${repo.name}">
      <div class="card-content">
        <h3>${repo.name}</h3>
        <p>${repo.description||"No description"}</p>
        <div class="btns">
          <a class="btn primary" href="${repo.html_url}" target="_blank">GitHub</a>
          ${repo.homepage?`<a class="btn secondary" href="${repo.homepage}" target="_blank">Live</a>`:""}
        </div>
      </div>
    `;

    container.appendChild(card);
  });

  observe();
});

/* SCENE REVEAL */
function observe(){
  const items=document.querySelectorAll(".card, .section, .featured-card");

  const io=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.add("show");
      }
    });
  },{threshold:0.15});

  items.forEach(i=>io.observe(i));
}

/* FEATURED reveal delay */
setTimeout(()=>{
  document.getElementById("featured").classList.add("show");
},500);
</script>

</body>
</html>
