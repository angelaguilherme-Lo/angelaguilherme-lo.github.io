<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Angela Guilherme | Web Developer Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* =========================
   ROOT THEME
========================= */
:root {
  --bg1: #0f172a;
  --bg2: #1e1b4b;
  --card: rgba(255,255,255,0.08);
  --text: #e2e8f0;
  --muted: #94a3b8;
  --accent1: #6366f1;
  --accent2: #ec4899;
}

body.light {
  --bg1: #f8fafc;
  --bg2: #eef2ff;
  --card: rgba(255,255,255,0.6);
  --text: #0f172a;
  --muted: #475569;
}

/* =========================
   GLOBAL
========================= */
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: radial-gradient(circle at 20% 20%, #6366f1 0%, transparent 40%),
              radial-gradient(circle at 80% 80%, #ec4899 0%, transparent 40%),
              linear-gradient(135deg, var(--bg1), var(--bg2));
  overflow-x: hidden;
  transition: 0.4s ease;
}

/* cursor glow */
.cursor {
  position: fixed;
  width: 250px;
  height: 250px;
  background: radial-gradient(circle, rgba(99,102,241,0.25), transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 0;
}

/* floating blobs */
.blob {
  position: fixed;
  width: 400px;
  height: 400px;
  filter: blur(120px);
  opacity: 0.35;
  z-index: 0;
  animation: float 12s infinite ease-in-out;
}

.blob.one { background: #6366f1; top: -100px; left: -100px; }
.blob.two { background: #ec4899; bottom: -120px; right: -120px; }

@keyframes float {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(40px); }
}

/* =========================
   HEADER / HERO
========================= */
header {
  text-align: center;
  padding: 100px 20px 40px;
  position: relative;
  z-index: 2;
}

h1 {
  font-size: 3.5rem;
  margin: 0;
  background: linear-gradient(90deg, var(--accent1), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

header p {
  color: var(--muted);
  font-size: 1.2rem;
}

/* controls */
.controls {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 20px;
}

input, button {
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 0.9rem;
}

input {
  width: 220px;
  background: var(--card);
  color: var(--text);
  backdrop-filter: blur(10px);
}

button {
  cursor: pointer;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  color: white;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
}

/* =========================
   GRID
========================= */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
  position: relative;
  z-index: 2;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}

/* =========================
   CARD (GLASS PREMIUM)
========================= */
.card {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  overflow: hidden;
  backdrop-filter: blur(14px);
  transform: translateY(40px);
  opacity: 0;
  transition: 0.4s ease;
}

.card.show {
  transform: translateY(0);
  opacity: 1;
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
}

.card img {
  width: 100%;
  height: 170px;
  object-fit: cover;
  transition: 0.4s;
}

.card:hover img {
  transform: scale(1.05);
}

.card-content {
  padding: 18px;
}

.card h3 {
  margin: 0 0 8px;
  font-size: 1.2rem;
}

.card p {
  font-size: 0.9rem;
  color: var(--muted);
}

/* buttons */
.actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}

a.btn {
  padding: 8px 12px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 0.8rem;
  transition: 0.2s;
}

a.primary {
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  color: white;
}

a.secondary {
  background: rgba(255,255,255,0.1);
  color: var(--text);
}

a.btn:hover {
  transform: translateY(-2px);
}

/* =========================
   FOOTER
========================= */
footer {
  text-align: center;
  padding: 50px;
  color: var(--muted);
}

/* =========================
   THEME TOGGLE
========================= */
.toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10;
}
</style>
</head>

<body>

<div class="cursor"></div>
<div class="blob one"></div>
<div class="blob two"></div>

<button class="toggle" onclick="toggleTheme()">🌙</button>

<header>
  <h1>Angela Guilherme</h1>
  <p>Ultra Premium Developer Portfolio</p>

  <div class="controls">
    <input id="search" placeholder="Search projects..." />
  </div>
</header>

<div class="container">
  <div class="grid" id="repos"></div>
</div>

<footer>© 2026 Angela Guilherme — Crafted with precision. </footer>

<script>
const username = "angelaguilherme-Lo";
const container = document.getElementById("repos");
let reposData = [];

/* cursor glow */
document.addEventListener("mousemove", e => {
  const cursor = document.querySelector(".cursor");
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

/* theme toggle */
function toggleTheme() {
  document.body.classList.toggle("light");
}

/* fetch repos */
fetch(`https://api.github.com/users/${username}/repos`)
.then(r => r.json())
.then(data => {
  reposData = data.filter(r => !r.fork);
  render(reposData);
});

/* render */
function render(data) {
  container.innerHTML = "";

  data.forEach((repo, i) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="https://opengraph.githubassets.com/1/${username}/${repo.name}">
      <div class="card-content">
        <h3>${repo.name}</h3>
        <p>${repo.description || "No description available"}</p>

        <div class="actions">
          <a class="btn primary" href="${repo.html_url}" target="_blank">GitHub</a>
          ${repo.homepage ? `<a class="btn secondary" href="${repo.homepage}" target="_blank">Live</a>` : ""}
        </div>
      </div>
    `;

    container.appendChild(card);

    setTimeout(() => card.classList.add("show"), i * 60);
  });

  observe();
}

/* scroll reveal */
function observe() {
  const cards = document.querySelectorAll(".card");
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) e.target.classList.add("show");
    });
  });

  cards.forEach(c => io.observe(c));
}

/* search filter */
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();
  const filtered = reposData.filter(r =>
    r.name.toLowerCase().includes(val)
  );
  render(filtered);
});
</script>

</body>
</html>
