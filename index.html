<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Angela Guilherme | Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      color: #0f172a;
    }

    header {
      padding: 80px 20px 40px;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin: 0;
      letter-spacing: -1px;
    }

    header p {
      margin-top: 12px;
      font-size: 1.2rem;
      color: #64748b;
    }

    .container {
      max-width: 1300px;
      margin: auto;
      padding: 20px 40px 80px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(10px);
      border-radius: 10px; /* reduced rounding */
      overflow: hidden;
      box-shadow: 0 15px 40px rgba(0,0,0,0.08);
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 25px 60px rgba(0,0,0,0.12);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 20px;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 1.3rem;
      line-height: 1.4;
      word-break: break-word; /* ensures long names wrap */
    }

    .card p {
      font-size: 0.95rem;
      color: #475569;
      margin-bottom: 15px;
      line-height: 1.5;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      font-size: 0.85rem;
      padding: 7px 14px;
      border-radius: 6px;
      font-weight: 500;
      transition: 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-secondary {
      background: rgba(226, 232, 240, 0.7); /* reduced opacity */
      color: #1e293b;
    }

    .btn-secondary:hover {
      background: rgba(203, 213, 225, 0.9);
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
      font-size: 0.9rem;
    }

    /* subtle animation */
    .card {
      animation: fadeUp 0.6s ease forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

  </style>
</head>

<body>

<header>
  <h1>Angela Guilherme</h1>
  <p>Creative Developer Portfolio</p>
</header>

<div class="container">
  <div class="grid" id="repos"></div>
</div>

<footer>
  © 2026 Angela Guilherme • Portfolio
</footer>

<script>
  const username = "angelaguilherme-Lo";

  fetch(`https://api.github.com/users/${username}/repos`)
    .then(res => res.json())
    .then(data => {

      const container = document.getElementById("repos");

      data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

      data.forEach((repo, index) => {

        if (repo.fork) return;

        const image = `https://opengraph.githubassets.com/1/${username}/${repo.name}`;

        const card = document.createElement("div");
        card.className = "card";
        card.style.animationDelay = `${index * 0.05}s`;

        card.innerHTML = `
          <img src="${image}" alt="${repo.name}">
          <div class="card-content">
            <h3>${repo.name}</h3>
            <p>${repo.description || "No description available."}</p>

            <div class="buttons">
              <a class="btn btn-primary" href="${repo.html_url}" target="_blank">
                GitHub
              </a>

              ${repo.homepage ? `
                <a class="btn btn-secondary" href="${repo.homepage}" target="_blank">
                  Live Demo
                </a>
              ` : ""}
            </div>
          </div>
        `;

        container.appendChild(card);
      });
    });
</script>

</body>
</html>
