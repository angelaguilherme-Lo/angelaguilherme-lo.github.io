<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Angela Guilherme | Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: radial-gradient(circle at 20% 30%, #e0e7ff, transparent),
              radial-gradient(circle at 80% 70%, #fbcfe8, transparent),
              linear-gradient(135deg, #f8fafc, #eef2ff);
  color: #0f172a;
  overflow-x: hidden;
}

/* ===== FLOATING BACKGROUND BLOBS ===== */
body::before,
body::after {
  content: "";
  position: fixed;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.4;
  z-index: -1;
}

body::before {
  background: #6366f1;
  top: -100px;
  left: -100px;
}

body::after {
  background: #ec4899;
  bottom: -120px;
  right: -100px;
}

/* ===== HEADER ===== */
header {
  text-align: center;
  padding: 100px 20px 50px;
}

h1 {
  font-size: 3.2rem;
  margin: 0;
  background: linear-gradient(90deg, #6366f1, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

header p {
  margin-top: 12px;
  font-size: 1.2rem;
  color: #64748b;
}

/* ===== GRID ===== */
.container {
  max-width: 1300px;
  margin: auto;
  padding: 20px 30px 80px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 32px;
}

/* ===== CARD ===== */
.card {
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(12px);
  box-shadow: 0 15px 50px rgba(0,0,0,0.08);
  transition: all 0.35s ease;
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 30px 80px rgba(0,0,0,0.15);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  opacity: 0.9;
  transition: 0.3s;
}

.card:hover img {
  opacity: 1;
  transform: scale(1.05);
}

/* CONTENT */
.card-content {
  padding: 20px;
}

.card h3 {
  margin: 0 0 8px;
  font-size: 1.25rem;
  line-height: 1.4;
  word-break: break-word;
}

.card p {
  font-size: 0.95rem;
  color: #475569;
  margin-bottom: 15px;
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.btn {
  padding: 7px 14px;
  font-size: 0.85rem;
  border-radius: 6px;
  text-decoration: none;
  font-weight: 500;
  transition: 0.2s;
}

.btn-primary {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
}

.btn-primary:hover {
  transform: translateY(-1px);
  opacity: 0.9;
}

.btn-secondary {
  background: rgba(255,255,255,0.6);
  border: 1px solid rgba(0,0,0,0.05);
  color: #1e293b;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.9);
}

/* ===== ANIMATION ===== */
.card {
  opacity: 0;
  transform: translateY(30px);
  animation: fadeUp 0.6s forwards;
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ===== FOOTER ===== */
footer {
  text-align: center;
  padding: 40px;
  color: #94a3b8;
}
</style>
</head>

<body>

<header>
  <h1>Angela Guilherme</h1>
  <p>Creative Developer Portfolio</p>
</header>

<div class="container">
  <div class="grid" id="repos"></div>
</div>

<footer>
  © 2026 Angela Guilherme • Designed with style ✨
</footer>

<script>
const username = "angelaguilherme-Lo";

fetch(`https://api.github.com/users/${username}/repos`)
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("repos");

    data.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

    data.forEach((repo, index) => {

      if (repo.fork) return;

      const image = `https://opengraph.githubassets.com/1/${username}/${repo.name}`;

      const card = document.createElement("div");
      card.className = "card";
      card.style.animationDelay = `${index * 0.07}s`;

      card.innerHTML = `
        <img src="${image}" alt="${repo.name}">
        <div class="card-content">
          <h3>${repo.name}</h3>
          <p>${repo.description || "No description available."}</p>

          <div class="buttons">
            <a class="btn btn-primary" href="${repo.html_url}" target="_blank">
              GitHub
            </a>

            ${repo.homepage ? `
              <a class="btn btn-secondary" href="${repo.homepage}" target="_blank">
                Live Demo
              </a>
            ` : ""}
          </div>
        </div>
      `;

      container.appendChild(card);
    });

  });
</script>

</body>
</html>
