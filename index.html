<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Angela Guilherme | Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(to bottom, #f8fafc, #eef2ff);
      color: #1e293b;
    }

    header {
      padding: 60px 20px 40px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 2.8rem;
      font-weight: 700;
    }

    header p {
      margin-top: 10px;
      font-size: 1.1rem;
      color: #64748b;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px 40px 60px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
    }

    .card {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: #e2e8f0;
    }

    .card-content {
      padding: 20px;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 1.2rem;
    }

    .card p {
      font-size: 0.9rem;
      color: #475569;
      min-height: 40px;
    }

    .buttons {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    .btn {
      text-decoration: none;
      font-size: 0.85rem;
      padding: 6px 12px;
      border-radius: 8px;
      font-weight: 500;
      transition: 0.2s;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }

    .btn-primary:hover {
      background: #2563eb;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #1e293b;
    }

    .btn-secondary:hover {
      background: #cbd5f5;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #94a3b8;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

<header>
  <h1>Angela Guilherme</h1>
  <p>My GitHub Projects Portfolio</p>
</header>

<div class="container">
  <div class="grid" id="repos"></div>
</div>

<footer>
  © 2026 Angela Guilherme • Built with GitHub Pages
</footer>

<script>
  const username = "angelaguilherme-Lo";

  fetch(`https://api.github.com/users/${username}/repos`)
    .then(res => res.json())
    .then(data => {

      const container = document.getElementById("repos");

      // Sort newest first
      data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

      data.forEach(repo => {

        if (repo.fork) return;

        // Auto-generated "preview image" (no upload needed)
        const image = `https://opengraph.githubassets.com/1/${username}/${repo.name}`;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <img src="${image}" alt="${repo.name}">
          <div class="card-content">
            <h3>${repo.name}</h3>
            <p>${repo.description || "No description available."}</p>

            <div class="buttons">
              <a class="btn btn-primary" href="${repo.html_url}" target="_blank">
                GitHub
              </a>

              ${repo.homepage ? `
                <a class="btn btn-secondary" href="${repo.homepage}" target="_blank">
                  Live Demo
                </a>
              ` : ""}
            </div>
          </div>
        `;

        container.appendChild(card);
      });
    });
</script>

</body>
</html>
